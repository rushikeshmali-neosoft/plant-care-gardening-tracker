<div class="calendar-container fade-in">
  <header class="calendar-header">
    <div class="header-left">
      <h1>Care Calendar</h1>
      <p class="subtitle">{{ currentDate() | date:'MMMM yyyy' }}</p>
    </div>
    <div class="header-right">
      <div class="view-switcher glass-card">
        <button mat-button class="active">Calendar</button>
        <button mat-button routerLink="/schedules/list">List View</button>
      </div>
      <div class="nav-controls glass-card">
        <button mat-icon-button (click)="prevMonth()">
          <mat-icon>chevron_left</mat-icon>
        </button>
        <button mat-button class="today-btn">Today</button>
        <button mat-icon-button (click)="nextMonth()">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </div>
  </header>

  <div class="calendar-grid-wrapper glass-card">
    <div class="weekday-header">
      <span *ngFor="let day of ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']">{{ day }}</span>
    </div>

    <div class="days-grid">
      <div *ngFor="let day of calendarDays()" 
           class="day-cell" 
           [class.other-month]="!day.isCurrentMonth"
           [class.today]="day.isToday">
        
        <span class="day-number">{{ day.date.getDate() }}</span>
        
        <div class="task-indicators">
          <div *ngFor="let task of day.tasks.slice(0, 3)" 
               class="task-dot" 
               [class.water]="task.careType === 'WATERING'"
               [class.feed]="task.careType === 'FERTILIZING'">
            <mat-icon>{{ getCareIcon(task.careType) }}</mat-icon>
          </div>
          <span *ngIf="day.tasks.length > 3" class="more-tasks">+{{ day.tasks.length - 3 }}</span>
        </div>
      </div>
    </div>
  </div>

  <aside class="legend glass-card">
    <div class="legend-item"><span class="dot water"></span> Watering</div>
    <div class="legend-item"><span class="dot feed"></span> Fertilizing</div>
    <div class="legend-item"><span class="dot prune"></span> Pruning</div>
  </aside>
</div>
