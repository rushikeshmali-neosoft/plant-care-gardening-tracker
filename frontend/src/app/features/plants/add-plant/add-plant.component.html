<div class="add-plant-dialog">
  <div class="dialog-header">
    <h2>Add New Resident</h2>
    <button mat-icon-button (click)="onCancel()" class="close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="plantForm" (ngSubmit)="onSubmit()" class="plant-form">
    <div class="form-grid">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Common Name</mat-label>
        <input matInput formControlName="commonName" placeholder="e.g. Monstera Deliciosa">
        <mat-icon matPrefix>local_florist</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Scientific Name</mat-label>
        <input matInput formControlName="scientificName">
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Species</mat-label>
        <input matInput formControlName="species">
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Location Type</mat-label>
        <mat-select formControlName="locationType">
          <mat-option *ngFor="let type of locationTypes" [value]="type">
            {{ type | titlecase }}
          </mat-option>
        </mat-select>
        <mat-icon matPrefix>location_on</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Room / Garden Area</mat-label>
        <input matInput formControlName="roomGarden" placeholder="e.g. Living Room">
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Purchase Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="purchaseDate">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option *ngFor="let status of plantStatuses" [value]="status">
            {{ status | titlecase }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="dialog-actions">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="plantForm.invalid || isLoading()">
        {{ isLoading() ? 'Adding...' : 'Add Plant' }}
      </button>
    </div>
  </form>
</div>
