<div class="growth-container fade-in">
  <header class="growth-header">
    <div class="header-left">
      <button mat-icon-button [routerLink]="['/plants', plantId()]">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div>
        <h1>Growth History</h1>
        <p class="subtitle">Tracking development over time</p>
      </div>
    </div>
    <button mat-raised-button color="primary" (click)="onAddMeasurement()">
      <mat-icon>add_chart</mat-icon>
      Log Growth
    </button>
  </header>

  <section class="trend-section glass-card" *ngIf="growthService.measurements().length >= 2">
    <h3>Height Trend (cm)</h3>
    <div class="chart-container">
      <svg viewBox="0 0 400 100" preserveAspectRatio="none">
        <polyline
          fill="none"
          stroke="var(--primary-light)"
          stroke-width="2"
          [attr.points]="trendPoints()"
        />
      </svg>
    </div>
  </section>

  <div class="table-wrapper glass-card">
    <table mat-table [dataSource]="growthService.measurements()" class="growth-table">

      <!-- Date Column -->
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let m">{{ m.measurementDate | date:'MMM d, y' }}</td>
      </ng-container>

      <!-- Height Column -->
      <ng-container matColumnDef="height">
        <th mat-header-cell *matHeaderCellDef>Height</th>
        <td mat-cell *matCellDef="let m">
          <span class="value">{{ m.heightCm }} cm</span>
        </td>
      </ng-container>

      <!-- Width Column -->
      <ng-container matColumnDef="width">
        <th mat-header-cell *matHeaderCellDef>Width</th>
        <td mat-cell *matCellDef="let m">
          <span class="value">{{ m.widthCm || '-' }} cm</span>
        </td>
      </ng-container>

      <!-- Notes Column -->
      <ng-container matColumnDef="notes">
        <th mat-header-cell *matHeaderCellDef>Notes</th>
        <td mat-cell *matCellDef="let m">
          <span class="notes-text">{{ m.notes || '-' }}</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="growth-row"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" colspan="4">
          <mat-icon>straighten</mat-icon>
          <p>No measurement logs found for this plant.</p>
        </td>
      </tr>
    </table>
  </div>
</div>
