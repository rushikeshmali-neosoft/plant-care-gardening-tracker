<div class="modal-container glass-card">
  <h2 mat-dialog-title>Log Care Activity</h2>
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Activity Type</mat-label>
          <mat-select formControlName="careType">
            <mat-option *ngFor="let type of careTypes" [value]="type">
              {{ type | titlecase }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Log Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="logDate">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Notes</mat-label>
          <textarea matInput formControlName="notes" placeholder="e.g. Added 500ml water, fertilizer ratio 1:100, etc." rows="3"></textarea>
        </mat-form-field>
      </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Save Log
      </button>
    </mat-dialog-actions>
  </form>
</div>
