<div class="modal-container glass-card">
  <h2 mat-dialog-title>Health Assessment</h2>
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
      <div class="form-grid">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Current Status</mat-label>
          <mat-select formControlName="healthStatus">
            <mat-option *ngFor="let status of healthStatuses" [value]="status">
              {{ status | titlecase }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Assessment Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="recordedDate">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <div class="full-width photo-section">
          <app-photo-upload></app-photo-upload>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Symptoms or Notes</mat-label>
          <textarea matInput formControlName="notes" placeholder="Yellow leaves, pests, wilting, etc." rows="3"></textarea>
        </mat-form-field>
      </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Save Assessment
      </button>
    </mat-dialog-actions>
  </form>
</div>
