<div class="modal-container glass-card">
  <h2 mat-dialog-title>Record Growth</h2>
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Height (cm)</mat-label>
          <input matInput type="number" formControlName="height" placeholder="e.g. 15.5">
          <mat-error *ngIf="form.get('height')?.hasError('required')">Height is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Width (cm)</mat-label>
          <input matInput type="number" formControlName="width" placeholder="Optional">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Measurement Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="measurementDate">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <div class="full-width photo-section">
          <app-photo-upload></app-photo-upload>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Observations</mat-label>
          <textarea matInput formControlName="notes" placeholder="New leaves, flowering, etc." rows="3"></textarea>
        </mat-form-field>
      </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button type="button" (click)="onCancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Save Measurement
      </button>
    </mat-dialog-actions>
  </form>
</div>
