<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FloraCare - Plant Monitoring</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script type="text/javascript">
    // Critical polyfills for legacy libraries (SockJS/STOMP) in modern Vite/Angular environments
    window.global = window;
    window.process = { env: { DEBUG: undefined } };
  </script>
  <style>
    /* Loading screen styles */
    .app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(232, 245, 233, 0.9), rgba(129, 199, 132, 0.7));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Roboto', sans-serif;
      color: #0a1f0a;
    }
    .app-loading-spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(45, 122, 58, 0.2);
      border-top-color: #2D7A3A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .app-loading-text {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .app-loading-subtext {
      font-size: 14px;
      color: #5a7a5a;
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
    }
    .app-error {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 235, 235, 0.95), rgba(255, 200, 200, 0.9));
      z-index: 9999;
      padding: 40px;
      text-align: center;
      font-family: 'Roboto', sans-serif;
      color: #b71c1c;
    }
    .app-error h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    .app-error p {
      font-size: 16px;
      margin-bottom: 24px;
      color: #5a3a3a;
    }
    .app-error button {
      background: #2D7A3A;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .app-error button:hover {
      background: #1B5E20;
    }
  </style>
</head>
<body class="mat-typography mat-app-background">
  <div id="app-loading" class="app-loading">
    <div class="app-loading-spinner"></div>
    <div class="app-loading-text">Loading FloraCare...</div>
    <div class="app-loading-subtext">Your plant monitoring dashboard is initializing. Please wait.</div>
  </div>
  <div id="app-error" class="app-error">
    <h1>Something went wrong</h1>
    <p id="error-message">The application failed to load. This could be due to a network issue or a temporary server problem.</p>
    <button onclick="window.location.reload()">Reload Application</button>
    <p style="margin-top: 20px; font-size: 14px;">If the problem persists, please contact support.</p>
  </div>
  <app-root></app-root>
  <script>
    // Hide loading screen when Angular bootstraps
    window.addEventListener('DOMContentLoaded', function() {
      var appRoot = document.querySelector('app-root');
      if (appRoot && appRoot.children.length > 0) {
        document.getElementById('app-loading').style.display = 'none';
      }
    });
    // Global error handler to show error screen
    window.addEventListener('error', function(event) {
      console.error('Global error caught:', event.error);
      document.getElementById('app-loading').style.display = 'none';
      document.getElementById('app-error').style.display = 'flex';
      document.getElementById('error-message').textContent = event.error?.message || 'An unexpected error occurred.';
    });
    // Catch unhandled promise rejections
    window.addEventListener('unhandledrejection', function(event) {
      console.error('Unhandled rejection:', event.reason);
      document.getElementById('app-loading').style.display = 'none';
      document.getElementById('app-error').style.display = 'flex';
      document.getElementById('error-message').textContent = event.reason?.message || 'A network or script error occurred.';
    });
  </script>
</body>
</html>
